<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Nonioaey Payment Gateway ✨</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+Thai:wght@300;400;700&family=Prompt:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gothic-silver: #c0c0c0;
            --gothic-dark-silver: #4a4a4a;
        }

        body {
            font-family: 'Noto Serif Thai', serif;
            background-color: #000000; /* สีดำสนิท */
            color: #FFFFFF; /* ข้อความสีขาว */
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- เอฟเฟกต์ฝนตก (Rain Effect) --- */
        .rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* อยู่หลังเนื้อหา */
            pointer-events: none;
        }

        .drop {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.4));
            width: 1px;
            height: 80px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* --- กรอบลวดลาย Gothic (Vine & Cross Style) --- */
        .gothic-border {
            border: 2px solid var(--gothic-silver);
            position: relative;
            background: rgba(20, 20, 20, 0.8);
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.2);
        }

        /* จำลองสัญลักษณ์กากบาทและเถาวัลย์มุมกรอบ */
        .gothic-border::before, .gothic-border::after {
            content: '†';
            position: absolute;
            color: var(--gothic-silver);
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            line-height: 1;
        }
        .gothic-border::before { top: -10px; left: -10px; transform: rotate(-45deg); }
        .gothic-border::after { top: -10px; right: -10px; transform: rotate(45deg); }

        /* --- ปรับแต่ง Headings --- */
        h1, .account-title {
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            color: #FFFFFF !important;
        }

        /* --- การ์ดหลัก --- */
        .main-card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid var(--gothic-dark-silver);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(192,192,192,0.1);
        }

        /* --- กล่องข้อมูล --- */
        .data-box {
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid var(--gothic-dark-silver);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .data-box:hover {
            border-color: var(--gothic-silver);
            background: rgba(40, 40, 40, 0.8);
        }

        /* --- ปุ่มสไตล์ Gothic --- */
        .btn-hover {
            background-color: #000000 !important;
            color: #FFFFFF !important;
            border: 1px solid var(--gothic-silver) !important;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-hover:hover {
            background-color: #ffffff !important;
            color: #000000 !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* ปรับสีไอคอนและตัวอักษรย่อย */
        .text-gray-400, .text-gray-600, .text-gray-700, .text-pink-500, .text-pink-400 {
            color: #e0e0e0 !important;
        }
        .bg-pink-100\/70, .bg-pink-400, .bg-pink-50\/60 {
            background-color: rgba(60, 60, 60, 0.5) !important;
            color: #ffffff !important;
        }

        /* --- เอฟเฟกต์เขม่าควัน (แทนฟองสบู่เดิม) --- */
        .particle {
            position: fixed;
            width: 4px; height: 4px;
            background-color: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
        }

        #toast {
            background: #1a1a1a;
            color: #ffffff;
            border: 1px solid var(--gothic-silver);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-5 relative">

    <div class="rain-container" id="rain"></div>

    <script>
        // สร้างเอฟเฟกต์ฝนตก
        const rainContainer = document.getElementById('rain');
        const dropCount = 60;
        for (let i = 0; i < dropCount; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
            drop.style.animationDelay = Math.random() * 2 + 's';
            drop.style.opacity = Math.random() * 0.3;
            rainContainer.appendChild(drop);
        }
    </script>

    <div id="toast" class="fixed top-8 left-1/2 transform -translate-x-1/2 px-8 py-3 rounded-full shadow-lg transition-all duration-300 opacity-0 -translate-y-6 pointer-events-none z-50 flex items-center gap-2 font-bold text-sm">
        † คัดลอกสำเร็จ †
    </div>

    <div class="relative z-10 mb-8 mt-4 w-full max-w-[300px] flex justify-center">

    <div class="main-card w-full max-w-md relative z-10 p-5 sm:p-7 space-y-6">
        
        <div class="bg-black/40 border border-gray-800 rounded-lg p-5 text-center">

                อย่าลืมโน้ตสลิปกันนะคะ<br>
                <span class="text-white">หากลืม! โอนมาใหม่ 0.1 พร้อมโน้ตสลิป</span>

        </div>

        <div class="data-box p-4 flex flex-col gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 border border-gray-500 rounded-full flex items-center justify-center font-bold text-xl shadow-lg">†</div>
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">K-Bank</span>
                    <span class="text-white font-bold text-[18px] tracking-wider">131-1-45867-8</span>
                </div>
            </div>
            <button onclick="copyAndExplode(event, '1311458678')" class="btn-hover w-full py-2.5 text-[13px] font-bold">

        </div>

        <div class="data-box p-4 flex flex-col gap-4">

                <div class="w-12 h-12 border border-gray-500 rounded-full flex items-center justify-center font-bold text-xl">W</div>
                <div class="flex flex-col">

                    <span class="text-white font-bold text-[18px]">0826348896</span>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="copyAndExplode(event, '0826348896')" class="btn-hover flex-1 py-2.5 text-[13px] font-bold">

                </button>
                <a href="https://tmn.app.link/nEoPnxQ9R1b" target="_blank" onclick="createExplosion(event)" class="btn-hover flex-1 py-2.5 text-[13px] font-bold flex items-center justify-center">

            <div class="flex justify-center gap-5">
                <a href="https://www.facebook.com/share/18W6w2niHC/?mibextid=wwXIfr" target="_blank" onclick="createExplosion(event)" class="btn-hover w-12 h-12 rounded-full flex items-center justify-center border border-gray-600">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </a>
                <a href="https://line.me/ti/p/LdBBk1Es5q" target="_blank" onclick="createExplosion(event)" class="btn-hover w-12 h-12 rounded-full flex items-center justify-center border border-gray-600">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.97 3.61 9.09 8.36 9.87.19.03.36-.08.36-.28v-1.5c-3.17.69-3.84-1.53-3.84-1.53-.52-1.32-1.27-1.67-1.27-1.67-1.03-.71.08-.69.08-.69 1.14.08 1.74 1.17 1.74 1.17 1.01 1.73 2.65 1.23 3.3.94.1-.73.4-1.23.72-1.51-2.53-.29-5.18-1.26-5.18-5.61 0-1.24.44-2.25 1.17-3.04-.12-.28-.51-1.44.11-2.99 0 0 .95-.3 3.12 1.16a10.8 10.8 0 0 1 2.8-.38c.95.01 1.9.13 2.8.38 2.16-1.47 3.11-1.16 3.11-1.16.62 1.55.23 2.71.11 2.99.73.79 1.17 1.8 1.17 3.04 0 4.36-2.66 5.31-5.19 5.6.4.35.77 1.04.77 2.09v3.1c0 .2.17.32.36.28C20.39 21.09 24 16.97 24 12c0-5.52-4.48-10-10-10z"/></svg>
                </a>
            </div>
        </div>

    </div>

    <script>
        function createExplosion(event) {
            const numParticles = 10; 
            const x = event.clientX;
            const y = event.clientY;

            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                document.body.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 20 + Math.random() * 30; 
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);

                setTimeout(() => particle.remove(), 600);
            }
        }

        function copyAndExplode(event, text) {
            createExplosion(event);

            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "† คัดลอกสำเร็จ †";
            btn.style.backgroundColor = "#ffffff";
            btn.style.color = "#000000";
            
            const toast = document.getElementById('toast');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.backgroundColor = ""; 
                btn.style.color = "";
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2000);
        }
    </script>
</body>
</html>
